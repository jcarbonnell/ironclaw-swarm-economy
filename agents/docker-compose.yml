services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ironclaw-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ironclaw-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (optional but recommended)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ironclaw-agent1:
    build:
      context: https://github.com/nearai/ironclaw.git
      dockerfile: Dockerfile
    container_name: ironclaw-agent1
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ironclaw_agent1?sslmode=disable
      NEAR_NETWORK: testnet
      # QDRANT_URL will be used later by a sync skill / orchestrator
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data/agent1:/data
    restart: unless-stopped

  ironclaw-agent2:
